<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ngủ ngoan nha Châu đáng iu</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(ellipse at bottom,#0a0f2a 0%,#000 100%);
}

/* ===== STARS ===== */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle infinite alternate ease-in-out;
}

@keyframes twinkle{
    from{opacity:0.3;}
    to{opacity:1;}
}

/* ===== IMAGE CONTAINER ===== */
.image-container{
    position:relative;
    width:85vw;
    max-width:420px;
    aspect-ratio:1/1;
    cursor:pointer;
    z-index:2;
}

/* Glow layer (ổn định mobile) */
.glow{
    position:absolute;
    inset:-15%;
    border-radius:40px;
    background:radial-gradient(circle,
        rgba(255,210,120,0.9) 0%,
        rgba(255,190,90,0.6) 40%,
        rgba(255,170,60,0.4) 60%,
        transparent 80%);
    filter:blur(60px);
    opacity:0;
    z-index:1;
    transform:translateZ(0);
    transition:opacity 0.8s ease;
}

/* Pulse */
@keyframes glowPulse{
    0%{transform:scale(1) translateZ(0);}
    50%{transform:scale(1.08) translateZ(0);}
    100%{transform:scale(1) translateZ(0);}
}

.glow.active{
    opacity:1;
    animation:glowPulse 4s ease-in-out infinite;
}

/* Images */
.image-container img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:30px;
    transition:opacity 1.6s ease;
    z-index:2;
}

#image2{
    opacity:0;
}

/* Swing */
@keyframes swing{
    0%{transform:rotate(0deg);}
    25%{transform:rotate(1deg);}
    50%{transform:rotate(0deg);}
    75%{transform:rotate(-1deg);}
    100%{transform:rotate(0deg);}
}

.swing{
    animation:swing 5s infinite ease-in-out;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="image-container" id="container">
    <div class="glow" id="glow"></div>
    <img src="1.jpg" id="image1">
    <img src="2.jpg" id="image2">
</div>

<audio id="music" src="2.mp3"></audio>

<script>
// Stars
const starsContainer=document.querySelector('.stars');
for(let i=0;i<60;i++){
    let star=document.createElement('div');
    star.classList.add('star');
    star.style.top=Math.random()*100+"%";
    star.style.left=Math.random()*100+"%";
    star.style.animationDuration=(Math.random()*3+2)+"s";
    starsContainer.appendChild(star);
}

// Flow
let clickCount=0;
const img1=document.getElementById("image1");
const img2=document.getElementById("image2");
const glow=document.getElementById("glow");
const container=document.getElementById("container");
const music=document.getElementById("music");

container.addEventListener("click",()=>{
    clickCount++;

    if(clickCount===1){
        img1.style.opacity="0";
        img2.style.opacity="1";
    }

    else if(clickCount===2){
        img2.classList.add("swing");
        glow.classList.add("active");
        music.play();
    }
});
</script>

</body>

</html>
